name: Bi-monthly maintenance

on:
  schedule:
    # 10:00 UTC every 1st and 15th of the month
    - cron: '0 10 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count resources
        id: count
        run: |
          COUNT=$(grep -c '^- \[' README.md || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT resources in README.md"

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --cache
            --max-cache-age 14d
            --max-concurrency 8
            --accept 200..=299,429
            --exclude-mail
            ./README.md
          fail: false
          output: ./lychee-out.md

      - name: Generate STATUS.md
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          COUNT="${{ steps.count.outputs.count }}"
          STATUS="${{ steps.lychee.outcome }}"
          cat > STATUS.md <<EOF
          # Status

          > Auto generated by [.github/workflows/maintenance.yml](.github/workflows/maintenance.yml). Runs on the 1st and 15th of each month.

          - **Last automated check** : $DATE
          - **Total resources** : $COUNT
          - **Link check** : $STATUS (see [latest workflow run](https://github.com/Vesanerie/awesome-gesture-drawing/actions))

          ---

          Want to suggest a resource ? Open a [pull request](https://github.com/Vesanerie/awesome-gesture-drawing/pulls) following the [CONTRIBUTING](CONTRIBUTING.md) guidelines.
          EOF

      - name: Commit STATUS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "chore : bi-monthly maintenance ($DATE)"
          git push

      - name: Open issue if links broken
        if: failure() || steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected on $(date -u +%Y-%m-%d)"
          content-filepath: ./lychee-out.md
          labels: maintenance, broken-link
